<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Andar Bahar - Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#071021;--card:rgba(255,255,255,0.04);--muted:#9aa4b2;--accent1:#ffd700;--accent2:#ffaa00;
        }
        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:linear-gradient(180deg,#041022 0%,#071021 60%);
            color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;
        }
        .container{
            background:var(--card);border-radius:18px;padding:22px;width:100%;max-width:720px;
            backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06);
            box-shadow:0 18px 50px rgba(2,6,23,0.7);display:flex;gap:20px;align-items:stretch;
        }
        .left,.right{flex:1}
        .left{min-width:260px}
        h1{font-size:1.6rem;margin-bottom:4px;background:linear-gradient(45deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{color:var(--muted);margin-bottom:16px;font-size:0.95rem}

        /* Form */
        .card{background:rgba(0,0,0,0.25);padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.03)}
        .input-group{margin-bottom:12px;text-align:left}
        .input-group label{display:block;font-size:0.88rem;margin-bottom:6px;color:#e6e9ee}
        .input-group input{width:100%;padding:11px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#fff;font-size:1rem;outline:none}
        .input-group input::placeholder{color:#9aa4b2}
        .input-group input:focus{box-shadow:0 0 0 4px rgba(255,215,0,0.06);border-color:var(--accent1)}
        .btn{padding:12px 20px;font-size:1rem;font-weight:700;border:none;border-radius:12px;cursor:pointer;letter-spacing:0.6px;color:#000;width:100%;margin:6px 0;transition:transform .18s ease,box-shadow .18s}
        .btn:active{transform:scale(.99)}
        .btn-gold{background:linear-gradient(90deg,var(--accent1),var(--accent2));box-shadow:0 8px 20px rgba(255,170,0,0.12)}
        .link-text{color:var(--accent1);cursor:pointer;font-size:0.9rem}
        .error-msg{color:#ff7b7b;font-size:0.86rem;margin-top:6px;display:none}

        /* Ad area */
        .ad-panel{display:flex;flex-direction:column;gap:12px;align-items:center}
        .ad-card{width:100%;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;align-items:center;gap:10px}
        .ad-hero{width:100%;height:140px;border-radius:10px;background:linear-gradient(90deg,#0b1220,#0d1928);display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:600}
        .ad-slot{width:100%;max-width:320px;height:250px;border-radius:10px;background:#0e1722;border:1px dashed rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.95rem}
        .ad-mini{width:100%;height:50px;border-radius:8px;background:#071122;border:1px dashed rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.88rem}
        .ad-cta{padding:8px 14px;border-radius:10px;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:#000;font-weight:700;cursor:pointer}

        /* Responsive */
        @media(max-width:720px){
            .container{flex-direction:column;padding:18px}
            .ad-hero{height:120px}
            .ad-slot{max-width:320px;height:180px}
        }

        /* Toast */
        .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;background:#0b1320;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);color:#dff0d8;box-shadow:0 8px 24px rgba(0,0,0,0.6);display:none}

        /* Consent */
        .consent{position:fixed;left:12px;right:12px;bottom:12px;background:rgba(3,8,15,0.9);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);display:flex;gap:10px;align-items:center;justify-content:space-between}
        .consent p{margin:0;color:var(--muted);font-size:0.9rem}
        .consent .c-actions{display:flex;gap:8px}

        .hidden{display:none!important}
    </style>
</head>
<body>
<div class="container">
    <h1>🎮 Andar Bahar</h1>
    <p class="subtitle">TON Blockchain Gaming Platform</p>

    <div id="loginForm">
        <div class="input-group"><label>📧 Email</label><input type="email" id="loginEmail" placeholder="email@example.com"></div>
        <div class="input-group"><label>🔒 Password</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
        <p class="error-msg" id="loginError"></p>
        <button class="btn btn-gold" onclick="login()">🔐 LOGIN</button>
        <p style="margin-top:10px;"><span class="link-text" onclick="toggleForm('signup')">New user? Sign Up</span></p>
    </div>

    <div id="signupForm" class="hidden">
        <div class="input-group"><label>📧 Email</label><input type="email" id="signupEmail" placeholder="email@example.com"></div>
        <div class="input-group"><label>🔒 Password (min 6)</label><input type="password" id="signupPassword" placeholder="••••••••"></div>
        <p class="error-msg" id="signupError"></p>
        <button class="btn btn-gold" onclick="signup()">✨ SIGN UP</button>
        <p style="margin-top:10px;"><span class="link-text" onclick="toggleForm('login')">Already have account? Login</span></p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey:"AIzaSyAQ4sLC47HVflDVQgyAC2gWnUo87wlQitQ",
        authDomain:"mogbf-525cb.firebaseapp.com",
        projectId:"mogbf-525cb",
        storageBucket:"mogbf-525cb.firebasestorage.app",
        messagingSenderId:"451875719799",
        appId:"1:451875719799:web:3980050067ddc5388ed472"
    };
    firebase.initializeApp(firebaseConfig);
    const auth=firebase.auth();
    const db=firebase.firestore();
    const tg=window.Telegram.WebApp;tg.expand();tg.ready();

    function toggleForm(f){
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('signupForm').classList.add('hidden');
        document.getElementById('loginError').style.display='none';
        document.getElementById('signupError').style.display='none';
        if(f==='login')document.getElementById('loginForm').classList.remove('hidden');
        else document.getElementById('signupForm').classList.remove('hidden');
    }

    function login(){
        const e=document.getElementById('loginEmail').value.trim();
        const p=document.getElementById('loginPassword').value;
        if(!e||!p){showError('loginError','Fill all fields');return;}
        document.getElementById('loginError').style.display='none';
        auth.signInWithEmailAndPassword(e,p)
        .then(()=>{showToast('Welcome back!');setTimeout(()=>window.location.href='game.html',600)})
        .catch(err=>{let m='Login failed!';if(err.code==='auth/user-not-found')m='User not found!';if(err.code==='auth/wrong-password')m='Wrong password!';showError('loginError',m);});
    }

    function signup(){
        const e=document.getElementById('signupEmail').value.trim();
        const p=document.getElementById('signupPassword').value;
        if(!e||!p){showError('signupError','Fill all fields');return;}
        if(p.length<6){showError('signupError','Min 6 chars');return;}
        document.getElementById('signupError').style.display='none';
        auth.createUserWithEmailAndPassword(e,p)
        .then(uc=>{
            try{ return db.collection('users').doc(uc.user.uid).set({email:uc.user.email,createdAt:firebase.firestore.FieldValue.serverTimestamp(),wins:0,losses:0,total:0}) }catch(e){return null}
        })
        .then(()=>{showToast('Account created');setTimeout(()=>window.location.href='game.html',700)})
        .catch(err=>{let m='Signup failed!';if(err.code==='auth/email-already-in-use')m='Email exists!';showError('signupError',m);});
    }

    function showError(id,msg){const el=document.getElementById(id);el.textContent='❌ '+msg;el.style.display='block';setTimeout(()=>el.style.display='none',4000);}

    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}

    function adClicked(){
        showToast('Opening offer...');
        // placeholder click action - replace with your campaign link
        window.open('https://example.com','_blank');
    }

    function showPrivacy(){
        // simple privacy quickview - replace with a modal or page if available
        alert('Privacy: We use cookies and on-chain events. No sale of personal data.');
    }

    function giveConsent(){
        localStorage.setItem('ad_consent','granted');
        document.getElementById('consent').classList.add('hidden');
        showToast('Thanks — ads enabled');
        loadAd();
    }

    function loadAd(){
        const slot=document.getElementById('adSlot');
        if(!slot) return;
        const c=localStorage.getItem('ad_consent');
        if(c!=='granted'){
            slot.textContent='Generic ad — enable ads for personalized offers';
            slot.style.cursor='default';
            slot.onclick=null;
            return;
        }
        // simple dynamic creative placeholder
        slot.innerHTML = '<div style="padding:12px;text-align:center;color:#ffd;">Sponsored<br><strong>Get 50% bonus</strong><br><small style="color:var(--muted)">Tap to install</small></div>';
        slot.style.cursor='pointer';
        slot.onclick = adClicked;
    }

    document.addEventListener('DOMContentLoaded',()=>{
        const c = localStorage.getItem('ad_consent');
        if(!c) document.getElementById('consent').classList.remove('hidden');
        else loadAd();
    });

    auth.onAuthStateChanged(user=>{if(user)window.location.href='game.html';});
    tg.BackButton.onClick(()=>tg.close());tg.BackButton.show();
</script>
</body>
</html>
